name: Deploy to GitHub Pages

# Build, test, and publish the site on every push to main (and on demand).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two production deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (deploy gate)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Project site lives at https://<user>.github.io/algo/
          VITE_BASE: /algo/

      - name: SPA fallback (serve index.html for client-side routes)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
